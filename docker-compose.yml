services:
  mallpilot-postgres:
    image: pgvector/pgvector:pg16
    container_name: mallpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mallpilot
    ports:
      - "5432:5432"
    volumes:
      - mallpilot-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mallpilot"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mallpilot-postgres-data:
